spring.application.name=hours

# H2 2.x: не комбинирай AUTO_SERVER=TRUE с DB_CLOSE_ON_EXIT=FALSE (JdbcSQLFeatureNotSupportedException 50100).
spring.datasource.url=jdbc:h2:file:${user.home}/.hours/data/hoursdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.ddl-auto=update

server.port=${SERVER_PORT:8086}
spring.h2.console.enabled=false

# JWT (HS256): минимум 32 байта секрет — смени в продукция
app.jwt.secret=${APP_JWT_SECRET:change-this-secret-to-32bytes-min!!change-this-secret-to-32bytes-min!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Първи администратор (създава се при старт, ако няма работник с този телефон)
app.bootstrap.admin-phone=${APP_BOOTSTRAP_ADMIN_PHONE:0877382224}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:123456}
# Име по подразбиране: „Администратор“ като Unicode escapes (UTF-8 в .properties без риск от CP1252 в редактора)
app.bootstrap.admin-name=${APP_BOOTSTRAP_ADMIN_NAME:\u0410\u0434\u043c\u0438\u043d\u0438\u0441\u0442\u0440\u0430\u0442\u043e\u0440}