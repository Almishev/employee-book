<!DOCTYPE html>
<html lang="bg">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Работници — Работни часове</title>
	<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
	<header class="topnav topnav-app">
		<h1>Работни часове</h1>
		<nav class="app-nav">
			<a href="/record-day.html" data-nav="record">Работен ден</a>
			<a href="/entries.html" data-nav="entries">Записи</a>
			<a href="/hours-summary.html" data-nav="hours">Смятане на часове</a>
			<a href="/admin-workers.html" data-nav="admin" id="navAdminLink">Работници</a>
			<span class="nav-user">
				<strong id="whoami"></strong>
				<span id="whoPhone" class="mono"></span>
				<button type="button" class="btn btn-danger" id="btnLogout">Изход</button>
			</span>
		</nav>
	</header>
	<div class="wrap">
		<div class="card" id="adminSection">
			<h2>Добавяне на работник</h2>
			<p class="hint">Име, телефон и начална парола. Името се записва на кирилица при латиница.</p>
			<label for="nwName">Име и фамилия</label>
			<input type="text" id="nwName" maxlength="200" />
			<label for="nwPhone">Телефон</label>
			<input type="text" id="nwPhone" inputmode="tel" placeholder="0888999777" />
			<label for="nwPass">Парола</label>
			<input type="password" id="nwPass" minlength="6" autocomplete="new-password" />
			<div class="row" style="margin-top: 0.75rem">
				<button type="button" class="btn btn-success" id="btnCreateWorker">Създай работник</button>
			</div>
			<div id="adminMsg" class="msg" role="status"></div>
			<h2 style="margin-top: 1.25rem">Списък работници</h2>
			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Име</th>
							<th>Телефон</th>
							<th>Роля</th>
						</tr>
					</thead>
					<tbody id="workersBody"></tbody>
				</table>
			</div>
		</div>
	</div>
	<script src="/js/api-client.js"></script>
	<script src="/js/app-common.js"></script>
	<script>
		function showAdminMsg(text, ok) {
			const m = document.getElementById("adminMsg");
			m.textContent = text;
			m.className = "msg show " + (ok ? "ok" : "err");
		}

		async function refreshWorkersList() {
			const tbody = document.getElementById("workersBody");
			tbody.innerHTML = "";
			const r = await apiRequest("GET", "/api/admin/workers");
			if (!r.ok) {
				showAdminMsg(r.status + " " + JSON.stringify(r.data), false);
				return;
			}
			const list = Array.isArray(r.data) ? r.data : [];
			for (const w of list) {
				const tr = document.createElement("tr");
				tr.innerHTML =
					"<td class=\"mono\">" +
					w.id +
					"</td><td>" +
					hoursEscapeHtml(String(w.name ?? "")) +
					'</td><td class="mono">' +
					hoursEscapeHtml(String(w.phoneNumber ?? "")) +
					"</td><td>" +
					hoursEscapeHtml(String(w.role ?? "")) +
					"</td>";
				tbody.appendChild(tr);
			}
		}

		document.getElementById("btnCreateWorker").addEventListener("click", async () => {
			const body = {
				name: document.getElementById("nwName").value.trim(),
				phoneNumber: document.getElementById("nwPhone").value.trim(),
				password: document.getElementById("nwPass").value,
			};
			if (!body.name || !body.phoneNumber || !body.password) {
				showAdminMsg("Попълни всички полета.", false);
				return;
			}
			const r = await apiRequest("POST", "/api/admin/workers", body);
			if (!r.ok) {
				showAdminMsg(r.status + " " + JSON.stringify(r.data), false);
				return;
			}
			showAdminMsg("Работникът е създаден: " + (r.data.name || "") + ".", true);
			document.getElementById("nwName").value = "";
			document.getElementById("nwPhone").value = "";
			document.getElementById("nwPass").value = "";
			await refreshWorkersList();
		});

		(async function init() {
			if (!hoursRequireAdmin()) {
				return;
			}
			hoursInitAppHeader("admin");
			await refreshWorkersList();
		})();
	</script>
</body>
</html>
